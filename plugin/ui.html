<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Inter, system-ui, -apple-system, sans-serif;
        font-size: 13px;
        color: #333;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 100vh;
      }
      h2 {
        font-size: 14px;
        font-weight: 600;
      }
      p {
        font-size: 12px;
        color: #666;
        line-height: 1.4;
      }
      label {
        font-size: 12px;
        font-weight: 500;
        color: #555;
      }
      input[type="text"] {
        width: 100%;
        padding: 6px 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 12px;
        font-family: monospace;
        margin-top: 4px;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: #4eba87;
      }
      button {
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-primary {
        background: #4eba87;
        color: #fff;
      }
      .btn-primary:hover {
        background: #3da876;
      }
      .btn-primary:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      .btn-secondary {
        background: #f0f0f0;
        color: #333;
      }
      .btn-secondary:hover {
        background: #e0e0e0;
      }
      .btn-secondary:disabled {
        background: #f5f5f5;
        color: #999;
        cursor: not-allowed;
      }
      #status {
        font-size: 12px;
        min-height: 18px;
        word-break: break-word;
      }
      .status-error {
        color: #d32f2f;
      }
      .status-success {
        color: #4eba87;
      }
      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      hr {
        border: none;
        border-top: 1px solid #eee;
      }
    </style>
  </head>
  <body>
    <h2>WorkspaceDev Export</h2>
    <p>
      Select layers in Figma, then <strong>Copy to Clipboard</strong> (paste
      into Inspector) or <strong>Send to WorkspaceDev</strong> directly.
    </p>
    <div class="actions">
      <button id="export-btn" class="btn-primary">Copy to Clipboard</button>
      <button id="download-btn" class="btn-secondary">Download JSON</button>
    </div>
    <hr />
    <div class="field">
      <label for="server-url">WorkspaceDev Server URL</label>
      <input
        id="server-url"
        type="text"
        value="http://localhost:1983"
        placeholder="http://localhost:1983"
      />
    </div>
    <button id="send-btn" class="btn-primary">Send to WorkspaceDev</button>
    <div id="status"></div>

    <script>
      const exportBtn = document.getElementById("export-btn");
      const downloadBtn = document.getElementById("download-btn");
      const sendBtn = document.getElementById("send-btn");
      const serverUrlInput = document.getElementById("server-url");
      const statusEl = document.getElementById("status");

      let lastPayload = null;

      exportBtn.addEventListener("click", () => {
        exportBtn.disabled = true;
        sendBtn.disabled = true;
        statusEl.textContent = "";
        statusEl.className = "";
        parent.postMessage(
          { pluginMessage: { type: "export-selection" } },
          "*",
        );
      });

      downloadBtn.addEventListener("click", () => {
        if (!lastPayload) {
          statusEl.textContent = "Nothing to download. Export first.";
          statusEl.className = "status-error";
          return;
        }
        downloadJson(lastPayload);
      });

      sendBtn.addEventListener("click", () => {
        const serverUrl = serverUrlInput.value.trim();
        if (!serverUrl) {
          statusEl.textContent = "Please enter a server URL.";
          statusEl.className = "status-error";
          return;
        }
        exportBtn.disabled = true;
        sendBtn.disabled = true;
        statusEl.textContent = "";
        statusEl.className = "";
        parent.postMessage(
          {
            pluginMessage: {
              type: "send-to-server",
              serverUrl,
            },
          },
          "*",
        );
      });

      window.onmessage = async (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === "copy-to-clipboard") {
          lastPayload = msg.payload;
          try {
            await navigator.clipboard.writeText(msg.payload);
            statusEl.textContent = "Copied to clipboard!";
            statusEl.className = "status-success";
          } catch {
            statusEl.textContent =
              "Clipboard write failed. Use Download instead.";
            statusEl.className = "status-error";
          }
          exportBtn.disabled = false;
          sendBtn.disabled = false;
        }

        if (msg.type === "send-payload") {
          lastPayload = msg.payload;
          await sendToServer(msg.payload, msg.serverUrl);
        }

        if (msg.type === "status") {
          statusEl.textContent = msg.message;
          statusEl.className = "";
        }

        if (msg.type === "error") {
          statusEl.textContent = msg.message;
          statusEl.className = "status-error";
          exportBtn.disabled = false;
          sendBtn.disabled = false;
        }
      };

      async function sendToServer(payload, serverUrl) {
        const importUrl = serverUrl.replace(/\/+$/, "") + "/workspace/figma-import";
        try {
          const res = await fetch(importUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: payload,
          });
          const body = await res.json();
          if (res.ok) {
            statusEl.innerHTML =
              "Import accepted! Job ID: <strong>" +
              escapeHtml(body.jobId) +
              "</strong> (" +
              body.selections +
              " selection(s))";
            statusEl.className = "status-success";
          } else {
            const requestId = body.requestId ? " [" + body.requestId + "]" : "";
            statusEl.textContent =
              "Server error: " + (body.message || res.statusText) + requestId;
            statusEl.className = "status-error";
          }
        } catch (err) {
          statusEl.textContent =
            "Connection failed: " + (err.message || "Could not reach server.");
          statusEl.className = "status-error";
        }
        exportBtn.disabled = false;
        sendBtn.disabled = false;
      }

      function downloadJson(payload) {
        const blob = new Blob([payload], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "workspace-dev-export.json";
        a.click();
        URL.revokeObjectURL(url);
        statusEl.textContent = "Downloaded!";
        statusEl.className = "status-success";
      }

      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }
    </script>
  </body>
</html>
