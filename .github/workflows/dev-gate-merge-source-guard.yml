name: dev-gate merge source guard

on:
  pull_request:
    branches: [dev-gate]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

permissions: {}

jobs:
  allow-only-dev-to-dev-gate:
    runs-on: ubuntu-22.04
    env:
      SOURCE_BRANCH: ${{ github.head_ref }}
    steps:
      - name: Enforce dev as the only source branch for dev-gate
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${SOURCE_BRANCH}" != "dev" ]]; then
            echo "Only branch 'dev' may merge into 'dev-gate'. Current source branch: '${SOURCE_BRANCH}'." >&2
            exit 1
          fi
