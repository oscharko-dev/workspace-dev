name: dev-gate merge source guard

on:
  pull_request:
    branches: [dev-gate]

jobs:
  allow-only-dev-to-dev-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce dev as the only source branch for dev-gate
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_HEAD_REF}" != "dev" ]]; then
            echo "Only branch 'dev' may merge into 'dev-gate'. Current source branch: '${GITHUB_HEAD_REF}'." >&2
            exit 1
          fi
