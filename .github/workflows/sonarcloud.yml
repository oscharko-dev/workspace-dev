# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow helps you trigger a SonarCloud analysis of your code and populates
# GitHub Code Scanning alerts with the vulnerabilities found.
# Free for open source project.

# 1. Login to SonarCloud.io using your GitHub account

# 2. Import your project on SonarCloud
#     * Add your GitHub organization first, then add your repository as a new project.
#     * Please note that many languages are eligible for automatic analysis,
#       which means that the analysis will start automatically without the need to set up GitHub Actions.
#     * This behavior can be changed in Administration > Analysis Method.
#
# 3. Follow the SonarCloud in-product tutorial
#     * a. Copy/paste the Project Key and the Organization Key into the args parameter below
#          (You'll find this information in SonarCloud. Click on "Information" at the bottom left)
#
#     * b. Generate a new token and add it to your Github repository's secrets using the name SONAR_TOKEN
#          (On SonarCloud, click on your avatar on top-right > My account > Security
#           or go directly to https://sonarcloud.io/account/security/)

# Feel free to take a look at our documentation (https://docs.sonarcloud.io/getting-started/github/)
# or reach out to our community forum if you need some help (https://community.sonarsource.com/c/help/sc/9)

name: SonarCloud analysis

on:
  push:
    branches: [ "dev", "dev-gate", "main" ]
  pull_request:
    branches: [ "dev" ]
  workflow_dispatch:

permissions:
  contents: read         # required by actions/checkout and for the scanner to read sources
  pull-requests: read    # allows SonarCloud to decorate PRs with analysis results
  security-events: write # allows publishing GitHub Code Scanning alerts

jobs:
  Analysis:
    runs-on: ubuntu-latest
    # Skip on fork PRs — repository secrets are unavailable there
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Full history is required so SonarCloud can perform blame annotations
          # and correctly identify new vs existing code in pull-request analysis.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1  # v6
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Run backend coverage (src + integration tests via c8/Node test runner).
      # continue-on-error keeps the Sonar step running even when integration
      # tests require external resources that are unavailable in this context.
      - name: Generate backend coverage report
        continue-on-error: true
        run: pnpm run test:coverage

      # Run UI coverage (Vitest + @vitest/coverage-v8 → coverage/ui/lcov.info).
      - name: Generate UI coverage report
        continue-on-error: true
        run: pnpm run ui:test:coverage

      # The scanner reads sonar-project.properties for all static settings.
      # Only the project key and organization are injected at runtime because
      # they differ per GitHub organisation/fork and must not be hard-coded.
      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216  # v2.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >-
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
          projectBaseDir: .
