name: workspace-dev visual benchmark

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
    paths:
      - "src/job-engine.ts"
      - "src/parity/**"
      - "src/job-engine/**"
      - "src/server/request-handler.ts"
      - "template/**"
      - "integration/paste-delta-benchmark*"
      - "integration/visual-benchmark*"
      - "integration/composite-quality*"
      - "integration/visual-quality*"
      - "integration/fixtures/visual-benchmark/**"
      - ".github/workflows/visual-benchmark.yml"
      - ".github/workflows/visual-benchmark-comment.yml"
      - "package.json"
      - "scripts/compute-composite-quality.ts"
      - "scripts/assert-no-skipped-tests.mjs"
      - "scripts/prepare-visual-benchmark-public-artifacts.mjs"
      - "scripts/print-visual-benchmark-summary.mjs"
      - "scripts/visual-benchmark-summary.mjs"
      - "scripts/print-visual-benchmark-pr-comment.mjs"
      - "scripts/visual-benchmark-pr-comment.mjs"
  workflow_dispatch:
    inputs:
      browsers:
        description: "Comma-separated browser list for the main benchmark job"
        required: false
        default: "chromium"
        type: string
      run_browser_matrix:
        description: "Also run the manual per-browser matrix job"
        required: false
        default: false
        type: boolean
      run_live_drift_audit:
        description: "Run live Figma drift audit against canonical references"
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

jobs:
  benchmark:
    name: benchmark
    permissions:
      checks: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VISUAL_BENCHMARK_BROWSERS: ${{ github.event_name == 'workflow_dispatch' && inputs.browsers || 'chromium' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1  # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validate browser list
        run: |
          input="$VISUAL_BENCHMARK_BROWSERS"
          normalized=$(echo "$input" | tr ',' '\n' | sort -u | paste -sd, -)
          for browser in $(echo "$normalized" | tr ',' ' '); do
            case "$browser" in
              chromium|firefox|webkit) ;;
              *) echo "::error::Unknown browser '$browser' in VISUAL_BENCHMARK_BROWSERS"; exit 1 ;;
            esac
          done
          echo "VISUAL_BENCHMARK_BROWSERS=$normalized" >> "$GITHUB_ENV"

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./node_modules/@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-${{ env.VISUAL_BENCHMARK_BROWSERS }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          browsers="${VISUAL_BENCHMARK_BROWSERS//,/ }"
          pnpm exec playwright install --with-deps $browsers

      - name: Install Playwright OS deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          browsers="${VISUAL_BENCHMARK_BROWSERS//,/ }"
          pnpm exec playwright install-deps $browsers

      - name: Run visual benchmark verification suites
        run: |
          set -euo pipefail
          mkdir -p artifacts/visual-benchmark/logs
          {
            pnpm exec tsx --test src/job-engine/visual-capture.test.ts src/job-engine/visual-diff.test.ts src/job-engine/visual-scoring.test.ts src/job-engine/pipeline/orchestrator.test.ts
            pnpm exec tsx --test integration/visual-benchmark.execution.test.ts
            pnpm exec tsx --test integration/visual-benchmark.test.ts
            pnpm exec tsx --test integration/visual-benchmark-runner.error-isolation.test.ts
            pnpm exec tsx --test integration/visual-quality-config.test.ts
            pnpm exec tsx --test integration/mutation-testing.integration.test.ts integration/visual-benchmark.cli.test.ts integration/visual-benchmark-summary.test.ts integration/paste-delta-benchmark.test.ts integration/paste-delta-benchmark.integration.test.ts src/job-engine/paste-delta-roots.test.ts
            pnpm exec tsx --test src/parity/ir-classification.test.ts src/parity/ir-screen-variants.test.ts src/parity/ir.test.ts
            pnpm exec vitest run --config ui-src/vite.config.ts ui-src/src/features/visual-quality/data/report-schema.test.ts ui-src/src/features/visual-quality/data/file-source.test.ts
          } 2>&1 | tee artifacts/visual-benchmark/logs/verification-suites.log
          node scripts/assert-no-skipped-tests.mjs artifacts/visual-benchmark/logs/verification-suites.log

      - name: Run paste delta benchmark gate
        run: pnpm run benchmark:paste-delta -- --check

      - name: Upload paste delta benchmark artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always() && hashFiles('artifacts/testing/paste-delta-benchmark.json') != ''
        with:
          name: workspace-dev-paste-delta-benchmark-${{ github.run_id }}
          path: artifacts/testing/paste-delta-benchmark.json
          if-no-files-found: ignore

      - name: Run frozen visual benchmark runner
        id: benchmark-run
        run: >-
          pnpm benchmark:visual -- --ci --enforce-thresholds --browsers "$VISUAL_BENCHMARK_BROWSERS"
          --storybook-component-catalog integration/fixtures/customer-board-golden/derived/storybook.component-visual-catalog.json
          --storybook-static-dir storybook-static/storybook-static

      - name: Install generated app dependencies for perf assertions
        if: always() && steps.benchmark-run.outcome == 'success'
        run: cd template/react-mui-app && pnpm install --frozen-lockfile --ignore-scripts

      - name: Build generated app for perf assertions
        if: always() && steps.benchmark-run.outcome == 'success'
        run: cd template/react-mui-app && pnpm run build

      - name: Run performance assertion for composite quality
        if: always() && steps.benchmark-run.outcome == 'success'
        env:
          FIGMAPIPE_PERF_ALLOW_BASELINE_BOOTSTRAP: "true"
          FIGMAPIPE_PERF_ROUTES_JSON: '["/"]'
          FIGMAPIPE_PERF_PROFILES_JSON: '["mobile","desktop"]'
          FIGMAPIPE_PERF_LIGHTHOUSE_TIMEOUT_MS: "90000"
          FIGMAPIPE_PERF_LIGHTHOUSE_MAX_ATTEMPTS: "1"
          FIGMAPIPE_PERF_BASELINE_PATH: template/react-mui-app/artifacts/performance/perf-baseline-ci.json
        run: |
          set +e
          timeout 240s pnpm perf:web:assert
          rc=$?
          set -e
          if [ "$rc" -eq 124 ]; then
            echo "::warning::perf:web:assert timed out after 240s; skipping composite quality perf integration for this run."
            exit 0
          fi
          exit "$rc"

      - name: Compute composite quality report
        if: always() && steps.benchmark-run.outcome == 'success' && hashFiles('artifacts/visual-benchmark/last-run.json') != '' && hashFiles('template/react-mui-app/artifacts/performance/perf-assert-report.json') != ''
        run: >-
          pnpm composite:quality
          --visual-last-run artifacts/visual-benchmark/last-run.json
          --perf-report template/react-mui-app/artifacts/performance/perf-assert-report.json
          --perf-artifact-dir template/react-mui-app/artifacts/performance
          --output artifacts/visual-benchmark/composite-quality-report.json
          --no-history

      - name: Summarize visual quality report
        if: always() && steps.benchmark-run.outcome == 'success' && hashFiles('artifacts/visual-benchmark/last-run.json') != ''
        env:
          VISUAL_BENCHMARK_ALLOW_STEP_SUMMARY: ${{ github.event_name != 'pull_request' }}
        run: node scripts/print-visual-benchmark-summary.mjs artifacts/visual-benchmark/last-run.json --check-output artifacts/visual-benchmark/check-output.json

      - name: Prepare public visual benchmark artifacts
        if: always() && hashFiles('artifacts/visual-benchmark/last-run.json') != ''
        run: node scripts/prepare-visual-benchmark-public-artifacts.mjs

      - name: Update benchmark check output
        if: always() && hashFiles('artifacts/visual-benchmark/check-output.json') != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            const fs = require("node:fs");

            const outputPath = "artifacts/visual-benchmark/check-output.json";
            const payload = JSON.parse(fs.readFileSync(outputPath, "utf8"));
            const { owner, repo } = context.repo;
            const runId = context.runId;
            const attemptNumber = Number(process.env.GITHUB_RUN_ATTEMPT ?? "1");
            const jobsResponse = await github.request(
              "GET /repos/{owner}/{repo}/actions/runs/{run_id}/attempts/{attempt_number}/jobs",
              {
                owner,
                repo,
                run_id: runId,
                attempt_number: attemptNumber,
                per_page: 100,
              },
            );
            const jobs = jobsResponse.data.jobs ?? [];
            const job = jobs.find((candidate) => candidate.name === process.env.GITHUB_JOB);
            if (!job || typeof job.check_run_url !== "string") {
              core.setFailed(`Could not locate check_run_url for job '${process.env.GITHUB_JOB}'.`);
              return;
            }

            const match = job.check_run_url.match(/\/check-runs\/(\d+)$/);
            if (!match) {
              core.setFailed(`Could not parse check run id from '${job.check_run_url}'.`);
              return;
            }

            await github.rest.checks.update({
              owner,
              repo,
              check_run_id: Number(match[1]),
              output: {
                title: String(payload.title).slice(0, 255),
                summary: String(payload.summary).slice(0, 65535),
                text: String(payload.text ?? "").slice(0, 65535),
                annotations: Array.isArray(payload.annotations) ? payload.annotations.slice(0, 50) : [],
              },
            });

      - name: Upload visual benchmark artifacts (public PR summary)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always() && github.event_name == 'pull_request'
        with:
          name: workspace-dev-visual-benchmark-${{ github.run_id }}
          path: artifacts/visual-benchmark/public-summary
          if-no-files-found: ignore

      - name: Upload visual benchmark artifacts (trusted full bundle)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always() && github.event_name != 'pull_request'
        with:
          name: workspace-dev-visual-benchmark-${{ github.run_id }}
          path: artifacts/visual-benchmark
          if-no-files-found: ignore

  benchmark-browser-matrix:
    if: github.event_name == 'workflow_dispatch' && inputs.run_browser_matrix
    name: benchmark matrix (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1  # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./node_modules/@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-${{ matrix.browser }}

      - name: Install Playwright browser (${{ matrix.browser }})
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        env:
          MATRIX_BROWSER: ${{ matrix.browser }}
        run: pnpm exec playwright install --with-deps "$MATRIX_BROWSER"

      - name: Install Playwright OS deps (cache hit) (${{ matrix.browser }})
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        env:
          MATRIX_BROWSER: ${{ matrix.browser }}
        run: pnpm exec playwright install-deps "$MATRIX_BROWSER"

      - name: Run frozen visual benchmark runner (${{ matrix.browser }})
        env:
          MATRIX_BROWSER: ${{ matrix.browser }}
        run: >-
          pnpm benchmark:visual -- --ci --enforce-thresholds --browsers "$MATRIX_BROWSER"
          --storybook-component-catalog integration/fixtures/customer-board-golden/derived/storybook.component-visual-catalog.json
          --storybook-static-dir storybook-static/storybook-static

      - name: Summarize visual quality report
        if: always() && hashFiles('artifacts/visual-benchmark/last-run.json') != ''
        env:
          VISUAL_BENCHMARK_ALLOW_STEP_SUMMARY: ${{ github.event_name != 'pull_request' }}
        run: node scripts/print-visual-benchmark-summary.mjs artifacts/visual-benchmark/last-run.json --check-output artifacts/visual-benchmark/check-output.json

      - name: Upload visual benchmark artifacts (${{ matrix.browser }})
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: workspace-dev-visual-benchmark-${{ github.run_id }}-${{ matrix.browser }}
          path: artifacts/visual-benchmark
          if-no-files-found: ignore

  benchmark-live-drift-audit:
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_drift_audit
    name: benchmark live drift audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1  # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run live drift audit (read-only)
        env:
          WORKSPACEDEV_FIGMA_TOKEN: ${{ secrets.WORKSPACEDEV_FIGMA_TOKEN }}
        run: pnpm benchmark:visual -- --live
