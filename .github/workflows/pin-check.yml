name: pin-check

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

permissions: {}

jobs:
  verify-pinned-shas:
    name: Verify pinned action SHAs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Ensure every `uses:` reference is pinned to a 40-char commit SHA
        shell: bash
        run: |
          set -uo pipefail
          unpinned=$(grep -rn 'uses:' .github/workflows/ \
            | grep -vE '@[0-9a-f]{40}' \
            | grep -v 'pin-check.yml' \
            | grep -v '^Binary' || true)
          if [[ -n "${unpinned}" ]]; then
            echo "::error::Unpinned GitHub Action reference(s) detected. Every 'uses:' must pin to a full 40-character commit SHA (see .github/workflows/pin-check.yml). Offending lines:" >&2
            echo "${unpinned}" >&2
            exit 1
          fi
          echo "All workflow 'uses:' references are pinned to 40-char commit SHAs."
