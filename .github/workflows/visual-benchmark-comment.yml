name: workspace-dev visual benchmark comment

on:
  workflow_run:
    workflows: ['workspace-dev visual benchmark']
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  post-comment:
    name: post-comment
    runs-on: ubuntu-22.04
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - name: Resolve PR and benchmark artifact
        id: resolve
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            const workflowRun = context.payload.workflow_run;
            const pullRequests = Array.isArray(workflowRun.pull_requests) ? workflowRun.pull_requests : [];
            if (pullRequests.length === 0) {
              core.notice(`No pull_request found for workflow run ${workflowRun.id}; skipping.`);
              core.setOutput("skip", "true");
              return;
            }

            const prNumber = pullRequests[0].number;
            const artifactName = `workspace-dev-visual-benchmark-${workflowRun.id}`;
            const { owner, repo } = context.repo;
            const response = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: workflowRun.id,
              per_page: 100,
            });
            const artifact = (response.data.artifacts ?? []).find(
              (candidate) => candidate.expired === false && candidate.name === artifactName,
            );

            core.setOutput("pr_number", String(prNumber));
            core.setOutput("artifact_name", artifactName);
            if (!artifact) {
              core.notice(`Artifact '${artifactName}' was not found for run ${workflowRun.id}; skipping.`);
              core.setOutput("skip", "true");
              return;
            }

            core.setOutput("skip", "false");
            core.setOutput("artifact_url", artifact.archive_download_url);
            core.setOutput("artifact_run_url", `${context.serverUrl}/${owner}/${repo}/actions/runs/${workflowRun.id}`);

      - name: Download visual benchmark artifact archive
        if: steps.resolve.outputs.skip == 'false'
        env:
          ARTIFACT_URL: ${{ steps.resolve.outputs.artifact_url }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p downloaded-artifact
          curl -L \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${ARTIFACT_URL}" \
            -o downloaded-artifact/artifact.zip
          unzip -o downloaded-artifact/artifact.zip -d downloaded-artifact/files

      - name: Locate structured benchmark payload
        id: payload
        if: steps.resolve.outputs.skip == 'false'
        run: |
          set -euo pipefail
          report_path="$(find downloaded-artifact/files -type f -path '*/last-run.public.json' -print -quit)"
          if [ -z "${report_path}" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "report_path=${report_path}" >> "$GITHUB_OUTPUT"

      - name: Render trusted visual benchmark PR comment payload
        if: steps.resolve.outputs.skip == 'false' && steps.payload.outputs.found == 'true'
        env:
          VISUAL_BENCHMARK_ALLOW_STEP_SUMMARY: "false"
          REPORT_PATH: ${{ steps.payload.outputs.report_path }}
          ARTIFACT_RUN_URL: ${{ steps.resolve.outputs.artifact_run_url }}
        run: >-
          node scripts/print-visual-benchmark-pr-comment.mjs
          "$REPORT_PATH"
          --output downloaded-artifact/rendered-pr-comment.json
          --artifact-url "$ARTIFACT_RUN_URL"

      - name: Post or update visual benchmark PR comment
        if: steps.resolve.outputs.skip == 'false' && steps.payload.outputs.found == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        env:
          PAYLOAD_PATH: downloaded-artifact/rendered-pr-comment.json
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
        with:
          script: |
            const fs = require("node:fs");
            const { owner, repo } = context.repo;

            const payloadPath = process.env.PAYLOAD_PATH;
            const prNumber = Number(process.env.PR_NUMBER);
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed(`Invalid pull request number: '${process.env.PR_NUMBER}'.`);
              return;
            }

            const payload = JSON.parse(fs.readFileSync(payloadPath, "utf8"));
            if (typeof payload.marker !== "string" || payload.marker.length === 0) {
              core.setFailed("The PR comment payload marker is missing or invalid.");
              return;
            }
            if (typeof payload.body !== "string" || payload.body.length === 0) {
              core.setFailed("The PR comment payload body is missing or invalid.");
              return;
            }
            if (!payload.body.startsWith(payload.marker)) {
              core.setFailed("The PR comment payload body must start with its marker.");
              return;
            }

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: prNumber, per_page: 100 },
            );
            const existing = comments.find(
              (comment) => typeof comment.body === "string" && comment.body.startsWith(payload.marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: payload.body,
              });
              core.info(`Updated existing PR comment ${existing.id}`);
              return;
            }

            const created = await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: payload.body,
            });
            core.info(`Created new PR comment ${created.data.id}`);
