name: workspace-dev visual benchmark comment

on:
  workflow_run:
    workflows: ['workspace-dev visual benchmark']
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  post-comment:
    name: post-comment
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'

    steps:
      - name: Resolve PR and benchmark artifact
        id: resolve
        uses: actions/github-script@v8
        with:
          script: |
            const workflowRun = context.payload.workflow_run;
            const pullRequests = Array.isArray(workflowRun.pull_requests) ? workflowRun.pull_requests : [];
            if (pullRequests.length === 0) {
              core.notice(`No pull_request found for workflow run ${workflowRun.id}; skipping.`);
              core.setOutput("skip", "true");
              return;
            }

            const prNumber = pullRequests[0].number;
            const candidateArtifactNames = [
              `workspace-dev-visual-benchmark-${workflowRun.id}`,
              `workspace-dev-visual-benchmark-${workflowRun.id}-benchmark`,
            ];
            const { owner, repo } = context.repo;
            const response = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: workflowRun.id,
              per_page: 100,
            });
            const artifact = (response.data.artifacts ?? []).find(
              (candidate) =>
                candidate.expired === false &&
                candidateArtifactNames.includes(candidate.name),
            );

            core.setOutput("pr_number", String(prNumber));
            if (!artifact) {
              core.notice(
                `Artifacts '${candidateArtifactNames.join(", ")}' were not found for run ${workflowRun.id}; skipping.`,
              );
              core.setOutput("skip", "true");
              return;
            }

            core.setOutput("skip", "false");
            core.setOutput("artifact_url", artifact.archive_download_url);

      - name: Download visual benchmark artifact archive
        if: steps.resolve.outputs.skip == 'false'
        env:
          ARTIFACT_URL: ${{ steps.resolve.outputs.artifact_url }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p downloaded-artifact
          curl -L \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${ARTIFACT_URL}" \
            -o downloaded-artifact/artifact.zip
          unzip -o downloaded-artifact/artifact.zip -d downloaded-artifact/files

      - name: Locate PR comment payload
        id: payload
        if: steps.resolve.outputs.skip == 'false'
        run: |
          set -euo pipefail
          payload_path="$(find downloaded-artifact/files -type f -name pr-comment.json -print -quit)"
          if [ -z "${payload_path}" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "path=${payload_path}" >> "$GITHUB_OUTPUT"

      - name: Post or update visual benchmark PR comment
        if: steps.resolve.outputs.skip == 'false' && steps.payload.outputs.found == 'true'
        uses: actions/github-script@v8
        env:
          PAYLOAD_PATH: ${{ steps.payload.outputs.path }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
        with:
          script: |
            const fs = require("node:fs");
            const { owner, repo } = context.repo;

            const payloadPath = process.env.PAYLOAD_PATH;
            const prNumber = Number(process.env.PR_NUMBER);
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed(`Invalid pull request number: '${process.env.PR_NUMBER}'.`);
              return;
            }

            const payload = JSON.parse(fs.readFileSync(payloadPath, "utf8"));
            if (typeof payload.marker !== "string" || payload.marker.length === 0) {
              core.setFailed("The PR comment payload marker is missing or invalid.");
              return;
            }
            if (typeof payload.body !== "string" || payload.body.length === 0) {
              core.setFailed("The PR comment payload body is missing or invalid.");
              return;
            }
            if (!payload.body.startsWith(payload.marker)) {
              core.setFailed("The PR comment payload body must start with its marker.");
              return;
            }

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: prNumber, per_page: 100 },
            );
            const existing = comments.find(
              (comment) => typeof comment.body === "string" && comment.body.startsWith(payload.marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: payload.body,
              });
              core.info(`Updated existing PR comment ${existing.id}`);
              return;
            }

            const created = await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: payload.body,
            });
            core.info(`Created new PR comment ${created.data.id}`);
