name: workspace-dev mutation testing (nightly)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  mutation-testing:
    timeout-minutes: 420
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: dev
          persist-credentials: false

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run mutation baseline (blocking >=58%)
        run: pnpm run test:mutation

      - name: Summarize mutation report
        if: always()
        run: node scripts/print-mutation-report-summary.mjs artifacts/testing/mutation/mutation.json

      - name: Upload mutation artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: workspace-dev-mutation-nightly-${{ github.run_id }}
          path: artifacts/testing/mutation
          if-no-files-found: ignore
