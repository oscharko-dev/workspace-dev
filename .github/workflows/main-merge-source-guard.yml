name: main merge source guard

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  allow-only-dev:
    runs-on: ubuntu-latest
    env:
      SOURCE_BRANCH: ${{ github.head_ref }}
    steps:
      - name: Enforce dev-gate as the only source branch for main
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${SOURCE_BRANCH}" != "dev-gate" ]]; then
            echo "Only branch 'dev-gate' may merge into 'main'. Current source branch: '${SOURCE_BRANCH}'." >&2
            exit 1
          fi
