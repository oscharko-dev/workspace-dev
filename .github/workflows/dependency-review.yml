name: dependency-review

# PR-time supply-chain gate that inspects the metadata diff of
# package.json / pnpm-lock.yaml changes against the GitHub Advisory
# Database BEFORE any install step runs lifecycle scripts. See #1239.
#
# Severity threshold scales with the target branch:
#   - main: moderate (release gate)
#   - dev: high (development gate)

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

permissions:
  contents: read

jobs:
  dependency-review:
    name: Review dependency diff (dev/main)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Review dependency changes for known advisories (PR)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: ${{ github.base_ref == 'main' && 'moderate' || 'high' }}
          fail-on-scopes: ${{ github.base_ref == 'main' && 'runtime' || 'runtime, development' }}
          comment-summary-in-pr: always
          deny-licenses: >-
            AGPL-1.0-only,
            AGPL-1.0-or-later,
            AGPL-3.0-only,
            AGPL-3.0-or-later,
            GPL-1.0-only,
            GPL-1.0-or-later,
            GPL-2.0-only,
            GPL-2.0-or-later,
            GPL-3.0-only,
            GPL-3.0-or-later,
            LGPL-2.0-only,
            LGPL-2.0-or-later,
            LGPL-2.1-only,
            LGPL-2.1-or-later,
            LGPL-3.0-only,
            LGPL-3.0-or-later,
            SSPL-1.0

      - name: Review dependency changes for known advisories (push)
        if: github.event_name == 'push'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          base-ref: ${{ github.event.before }}
          head-ref: ${{ github.sha }}
          fail-on-severity: ${{ github.ref_name == 'main' && 'moderate' || 'high' }}
          fail-on-scopes: ${{ github.ref_name == 'main' && 'runtime' || 'runtime, development' }}
          comment-summary-in-pr: never
          deny-licenses: >-
            AGPL-1.0-only,
            AGPL-1.0-or-later,
            AGPL-3.0-only,
            AGPL-3.0-or-later,
            GPL-1.0-only,
            GPL-1.0-or-later,
            GPL-2.0-only,
            GPL-2.0-or-later,
            GPL-3.0-only,
            GPL-3.0-or-later,
            LGPL-2.0-only,
            LGPL-2.0-or-later,
            LGPL-2.1-only,
            LGPL-2.1-or-later,
            LGPL-3.0-only,
            LGPL-3.0-or-later,
            SSPL-1.0
