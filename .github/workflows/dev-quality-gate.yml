name: workspace-dev dev quality gate

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

permissions:
  contents: read

jobs:
  setup:
    timeout-minutes: 5
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
      ui: ${{ steps.filter.outputs.ui }}
      plugin: ${{ steps.filter.outputs.plugin }}
      templates: ${{ steps.filter.outputs.templates }}
      scripts: ${{ steps.filter.outputs.scripts }}
      workflows: ${{ steps.filter.outputs.workflows }}
      docs: ${{ steps.filter.outputs.docs }}
      config: ${{ steps.filter.outputs.config }}
      full: ${{ steps.full.outputs.value }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            src:
              - 'src/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsup.config.ts'
              - 'tsconfig.json'
            ui:
              - 'ui-src/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            plugin:
              - 'plugin/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            templates:
              - 'template/**'
            scripts:
              - 'scripts/**'
              - 'package.json'
            workflows:
              - '.github/workflows/**'
              - '.github/dependabot.yml'
              - '.github/CODEOWNERS'
            docs:
              - '**/*.md'
              - 'docs/**'
              - 'CHANGELOG.md'
              - 'CONTRACT_CHANGELOG.md'
              - 'README.md'
            config:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'eslint.config.js'
              - 'tsup.config.ts'
              - 'stryker.config.mjs'

      - id: full
        env:
          WORKFLOWS_CHANGED: ${{ steps.filter.outputs.workflows }}
          CONFIG_CHANGED: ${{ steps.filter.outputs.config }}
        run: |
          if [ "$WORKFLOWS_CHANGED" = "true" ] || [ "$CONFIG_CHANGED" = "true" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

  policy-guards:
    needs: [setup]
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a  # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install template dependencies
        run: pnpm --dir template/react-mui-app install --frozen-lockfile --ignore-scripts

      - name: Install Tailwind template dependencies
        run: pnpm --dir template/react-tailwind-app install --frozen-lockfile --ignore-scripts

      - name: Enforce workflow --ignore-scripts policy
        run: pnpm run verify:workflow-install-scripts

      - name: Enforce workflow persist-credentials policy
        run: pnpm run verify:workflow-persist-credentials

      - name: Enforce pnpm onlyBuiltDependencies allowlist
        run: pnpm run verify:built-deps-allowlist

      - name: Enforce dependency freshness (minimum-release-age) policy
        run: pnpm run verify:npmrc-freshness

      - name: Enforce lockfile host allowlist
        run: pnpm run verify:lockfile-hosts

      - name: Enforce pipeline/template docs version consistency
        run: pnpm run verify:docs-template-stack

      - name: Enforce Tailwind template dependency denylist
        run: pnpm run template:tailwind:dependency-denylist

      - name: Enforce architecture boundaries
        run: pnpm run lint:boundaries

      - name: Enforce zero telemetry policy
        run: pnpm run lint:no-telemetry

      - name: Enforce repository secret policy
        run: pnpm run lint:secrets:all

      - name: Enforce TypeScript style
        run: pnpm run lint:ts-style

      - name: Enforce UI lint rules
        run: pnpm run ui:lint

  typecheck:
    needs: [setup]
    if: needs.setup.outputs.src == 'true' || needs.setup.outputs.ui == 'true' || needs.setup.outputs.plugin == 'true' || needs.setup.outputs.full == 'true'
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a  # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: pnpm run typecheck

  unit-tests:
    needs: [setup]
    if: false  # temporarily disabled — re-enable when test suite is stable
    timeout-minutes: 60
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a  # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Canonical tests
        run: pnpm run test

  template-tests:
    needs: [setup]
    if: needs.setup.outputs.templates == 'true' || needs.setup.outputs.src == 'true' || needs.setup.outputs.config == 'true' || needs.setup.outputs.full == 'true'
    timeout-minutes: 45
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a  # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install template dependencies
        run: pnpm --dir template/react-mui-app install --frozen-lockfile --ignore-scripts

      - name: Install Tailwind template dependencies
        run: pnpm --dir template/react-tailwind-app install --frozen-lockfile --ignore-scripts

      - name: Template Vitest tests
        run: pnpm run template:test

      - name: Tailwind template lint
        run: pnpm run template:tailwind:lint

      - name: Tailwind template typecheck
        run: pnpm run template:tailwind:typecheck

      - name: Tailwind template Vitest tests
        run: pnpm run template:tailwind:test

      - name: Tailwind template build
        run: pnpm run template:tailwind:build

      - name: Tailwind template UI validation
        run: pnpm run template:tailwind:validate:ui

  golden-and-ti:
    needs: [setup]
    if: needs.setup.outputs.src == 'true' || needs.setup.outputs.config == 'true' || needs.setup.outputs.full == 'true'
    timeout-minutes: 90
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a  # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Golden parity fixtures
        run: pnpm run test:golden

      - name: Test-intelligence multi-source eval gate
        run: pnpm run test:ti-multi-source-eval

      - name: Test-intelligence eval gate
        run: pnpm run test:ti-eval

  coverage:
    needs: [setup]
    if: false  # temporarily disabled — re-enable when test suite is stable
    timeout-minutes: 60
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a  # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: UI coverage gate
        run: pnpm run ui:test:coverage

      - name: Coverage thresholds
        run: pnpm run test:coverage

  e2e:
    needs: [setup]
    if: false  # temporarily disabled — re-enable when test suite is stable
    timeout-minutes: 45
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a  # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Tailwind template dependencies
        run: pnpm --dir template/react-tailwind-app install --frozen-lockfile --ignore-scripts

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser (Chromium)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: UI E2E tests
        run: pnpm run ui:test:e2e

      - name: Tailwind template Playwright validation
        run: pnpm run template:tailwind:validate:playwright

  security-smoke:
    needs: [setup]
    if: needs.setup.outputs.src == 'true' || needs.setup.outputs.config == 'true' || needs.setup.outputs.full == 'true'
    timeout-minutes: 60
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a  # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Runtime security smoke suite
        run: pnpm run test:dast-smoke

      - name: Upload runtime security smoke artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: failure()
        with:
          name: workspace-dev-dev-dast-smoke-${{ github.run_id }}
          path: artifacts/testing/dast-smoke
          if-no-files-found: ignore

      - name: Runtime load smoke suite
        run: pnpm run test:load

      - name: Upload runtime load smoke artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: failure()
        with:
          name: workspace-dev-dev-load-smoke-${{ github.run_id }}
          path: artifacts/testing/load-smoke
          if-no-files-found: ignore

  build-and-publish-checks:
    needs: [setup]
    if: false  # temporarily disabled — re-enable when test suite is stable
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a  # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install template dependencies
        run: pnpm --dir template/react-mui-app install --frozen-lockfile --ignore-scripts

      - name: Install Tailwind template dependencies
        run: pnpm --dir template/react-tailwind-app install --frozen-lockfile --ignore-scripts

      - name: Build package
        run: pnpm run build

      - name: Enforce profile tarball secret policy
        run: pnpm run lint:secrets:profiles

      - name: Enforce package size budget
        run: pnpm run lint:size

      - name: Run profile release gates
        run: pnpm run verify:profile-gates

      - name: Enforce generated API reference freshness
        run: pnpm run docs:api:check

      - name: Enforce dependency vulnerability gate
        run: pnpm run verify:audit

      - name: Enforce template dependency vulnerability gate
        run: pnpm run template:audit

      - name: Verify npm signature attestations
        run: npm audit signatures

      - name: Verify template npm signature attestations
        run: pnpm run template:signatures

  performance-web:
    needs: [setup]
    if: needs.setup.outputs.templates == 'true' || needs.setup.outputs.full == 'true'
    timeout-minutes: 180
    runs-on: ubuntu-22.04
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a  # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Run performance baseline + assert for both templates
        run: |
          set -euo pipefail
          for dir in template/react-mui-app template/react-tailwind-app; do
            echo "::group::performance-web: $dir"
            pnpm --dir "$dir" install --frozen-lockfile --ignore-scripts
            pnpm --dir "$dir" run typecheck
            pnpm --dir "$dir" run build
            FIGMAPIPE_PERF_ARTIFACT_DIR=artifacts/performance \
            FIGMAPIPE_PERF_BASELINE_PATH=artifacts/performance/perf-measured-baseline.json \
            FIGMAPIPE_PERF_REPORT_PATH=artifacts/performance/perf-baseline-report.json \
            FIGMAPIPE_PERF_STRICT=false \
            FIGMAPIPE_PERF_ALLOW_BASELINE_BOOTSTRAP=true \
              pnpm --dir "$dir" run perf:baseline
            FIGMAPIPE_PERF_ARTIFACT_DIR=artifacts/performance \
            FIGMAPIPE_PERF_BASELINE_PATH=perf-baseline.json \
            FIGMAPIPE_PERF_STRICT=true \
            FIGMAPIPE_PERF_ALLOW_BASELINE_BOOTSTRAP=false \
              pnpm --dir "$dir" run perf:assert
            node scripts/print-perf-report-summary.mjs "$dir/artifacts/performance/perf-baseline-report.json" || true
            node scripts/print-perf-report-summary.mjs "$dir/artifacts/performance/perf-assert-report.json" || true
            echo "::endgroup::"
          done

      - name: Upload web performance artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: workspace-dev-dev-performance-web-${{ github.run_id }}
          path: template/*/artifacts/performance
          if-no-files-found: ignore

  dev-gate-summary:
    needs:
      - setup
      - policy-guards
      - typecheck
      - template-tests
      - golden-and-ti
      - security-smoke
      # unit-tests, coverage, e2e, build-and-publish-checks temporarily excluded (#1736)
    if: always()
    timeout-minutes: 5
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Aggregate dev-gate result
        env:
          SETUP: ${{ needs.setup.result }}
          POLICY_GUARDS: ${{ needs.policy-guards.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          TEMPLATE_TESTS: ${{ needs.template-tests.result }}
          GOLDEN_AND_TI: ${{ needs.golden-and-ti.result }}
          SECURITY_SMOKE: ${{ needs.security-smoke.result }}
        run: |
          set -euo pipefail
          fail=0
          echo "SETUP=${SETUP}"
          if [ "${SETUP}" != "success" ]; then
            echo "::error::dev-gate aggregate: setup job did not succeed (result=${SETUP}); downstream skips are not safe"
            fail=1
          fi
          for name in POLICY_GUARDS TYPECHECK TEMPLATE_TESTS GOLDEN_AND_TI SECURITY_SMOKE; do
            value="${!name}"
            echo "${name}=${value}"
            case "$value" in
              success|skipped) ;;
              *) fail=1 ;;
            esac
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::dev-gate aggregate: one or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "dev-gate aggregate: setup succeeded and all required jobs succeeded or were skipped"
