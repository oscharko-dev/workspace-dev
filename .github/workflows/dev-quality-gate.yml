name: workspace-dev dev quality gate

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

permissions:
  contents: read

jobs:
  policy-guards:
    timeout-minutes: 20
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Supply-chain and workflow policy
        run: |
          pnpm run verify:workflow-install-scripts
          pnpm run verify:workflow-persist-credentials
          pnpm run verify:built-deps-allowlist
          pnpm run verify:pnpm-supply-chain-policy
          pnpm run verify:supply-chain-iocs
          pnpm run verify:npmrc-freshness
          pnpm run verify:lockfile-hosts
          pnpm run verify:audit

      - name: Repository policy
        run: |
          pnpm run lint:boundaries
          pnpm run lint:schema-names
          pnpm run lint:playwright-webserver
          pnpm run lint:ts-style
          pnpm run lint:no-telemetry
          pnpm run lint:secrets:all
          pnpm run ui:lint

  typecheck-build:
    timeout-minutes: 25
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

  focused-tests:
    timeout-minutes: 25
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install template validation seeds
        run: |
          pnpm --dir template/react-mui-app install --frozen-lockfile --ignore-scripts
          pnpm --dir template/react-tailwind-app install --frozen-lockfile --ignore-scripts

      - name: Script and workflow regression tests
        run: pnpm run test:scripts

      - name: Runtime security smoke
        run: pnpm run test:dast-smoke

      - name: Runtime queue/load smoke
        run: pnpm run test:load

  template-smoke:
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install template dependencies
        run: |
          pnpm --dir template/react-mui-app install --frozen-lockfile --ignore-scripts
          pnpm --dir template/react-tailwind-app install --frozen-lockfile --ignore-scripts

      - name: Template smoke tests
        run: |
          pnpm run template:tailwind:dependency-denylist
          pnpm run template:test
          pnpm run template:tailwind:lint
          pnpm run template:tailwind:typecheck
          pnpm run template:tailwind:test
          pnpm run template:tailwind:build
          pnpm run template:tailwind:validate:ui

  dev-summary:
    needs:
      - policy-guards
      - typecheck-build
      - focused-tests
      - template-smoke
    if: always()
    timeout-minutes: 5
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Aggregate dev result
        env:
          POLICY_GUARDS: ${{ needs.policy-guards.result }}
          TYPECHECK_BUILD: ${{ needs.typecheck-build.result }}
          FOCUSED_TESTS: ${{ needs.focused-tests.result }}
          TEMPLATE_SMOKE: ${{ needs.template-smoke.result }}
        run: |
          set -euo pipefail
          fail=0
          for name in POLICY_GUARDS TYPECHECK_BUILD FOCUSED_TESTS TEMPLATE_SMOKE; do
            value="${!name}"
            echo "${name}=${value}"
            case "$value" in
              success) ;;
              *) fail=1 ;;
            esac
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::dev aggregate: one or more fast-gate jobs failed or were cancelled"
            exit 1
          fi
          echo "dev aggregate: all fast-gate jobs succeeded"
