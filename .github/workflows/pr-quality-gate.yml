name: workspace-dev PR quality gate

on:
  pull_request:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

permissions:
  contents: read

jobs:
  dev-summary:
    name: dev-summary
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install template validation seeds
        run: |
          pnpm --dir template/react-mui-app install --frozen-lockfile --ignore-scripts
          pnpm --dir template/react-tailwind-app install --frozen-lockfile --ignore-scripts

      - name: Workflow and supply-chain policy
        run: |
          pnpm run verify:workflow-install-scripts
          pnpm run verify:workflow-persist-credentials
          pnpm run verify:built-deps-allowlist
          pnpm run verify:npmrc-freshness
          pnpm run verify:lockfile-hosts
          pnpm run verify:audit

      - name: Repository policy
        run: |
          pnpm run lint:boundaries
          pnpm run lint:no-telemetry
          pnpm run lint:secrets:all
          pnpm run lint:ts-style
          pnpm run ui:lint

      - name: Contract and governance drift policy
        run: |
          pnpm run verify:prompt-template-version
          pnpm run verify:contract-changelog -- --base "origin/${{ github.base_ref }}" --head HEAD --merge-base
          pnpm run model-card:check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Focused tests
        run: |
          pnpm run test:scripts
          pnpm run test:dast-smoke
          pnpm run test:load

      - name: Build
        run: pnpm run build
