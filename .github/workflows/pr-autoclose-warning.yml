name: workspace-dev PR auto-close warning

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize, closed]

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  warn-missing-autoclose-keyword:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          persist-credentials: false

      - name: Warn when #N references are missing auto-close keywords
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            const path = require("node:path");
            const { pathToFileURL } = require("node:url");

            // Delegates core.warning(), issues.createComment(),
            // issues.updateComment(), and issues.deleteComment()
            // behavior to scripts/pr-autoclose-warning.mjs.
            const moduleUrl = pathToFileURL(
              path.join(process.env.GITHUB_WORKSPACE, "scripts/pr-autoclose-warning.mjs"),
            ).href;
            const { runPrAutocloseWarning } = await import(moduleUrl);

            await runPrAutocloseWarning({ core, context, github });
