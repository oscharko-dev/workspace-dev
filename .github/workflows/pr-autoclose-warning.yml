name: PR auto-close warning

"on":
  pull_request_target:
    types: [opened, edited, reopened, synchronize, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  warn-missing-autoclose-keywords:
    name: Warn about issue references without auto-close keywords
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout trusted base repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Post or update warning comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const path = require("node:path");
            const { pathToFileURL } = require("node:url");
            const helperPath = path.join(
              process.env.GITHUB_WORKSPACE,
              "scripts/pr-autoclose-warning.mjs",
            );
            const { runPrAutocloseWarning } = await import(pathToFileURL(helperPath).href);

            // Contract implemented by scripts/pr-autoclose-warning.mjs:
            // core.warning(
            // github.rest.issues.createComment
            // github.rest.issues.updateComment
            // github.rest.issues.deleteComment
            await runPrAutocloseWarning({ core, context, github });
