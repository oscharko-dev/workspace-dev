name: PR auto-close warning

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  warn-missing-autoclose-keywords:
    name: Warn about issue references without auto-close keywords
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout trusted base repository helper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Emit warning summary
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const path = require("node:path");
            const { pathToFileURL } = require("node:url");
            const helperPath = path.join(
              process.env.GITHUB_WORKSPACE,
              "scripts/pr-autoclose-warning.mjs",
            );
            const { runPrAutocloseWarning } = await import(pathToFileURL(helperPath).href);

            await runPrAutocloseWarning({
              core,
              context,
              commentMode: "summary",
            });
