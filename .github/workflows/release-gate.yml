name: workspace-dev release gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

permissions:
  contents: read

jobs:
  quality:
    timeout-minutes: 25
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Set reproducible build metadata
        shell: bash
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
          echo "TZ=UTC" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install template dependencies
        if: matrix.node-version == 22
        run: |
          pnpm --dir template/react-mui-app install --frozen-lockfile --ignore-scripts
          pnpm --dir template/react-tailwind-app install --frozen-lockfile --ignore-scripts

      - name: Supply-chain and workflow policy
        if: matrix.node-version == 22
        run: |
          pnpm run verify:workflow-install-scripts
          pnpm run verify:workflow-persist-credentials
          pnpm run verify:built-deps-allowlist
          pnpm run verify:pnpm-supply-chain-policy
          pnpm run verify:supply-chain-iocs
          pnpm run verify:npmrc-freshness
          pnpm run verify:lockfile-hosts
          pnpm run template:tailwind:dependency-denylist
          pnpm run verify:audit
          pnpm run template:audit
          npm audit signatures

      - name: Repository policy
        if: matrix.node-version == 22
        run: |
          pnpm run lint:boundaries
          pnpm run lint:schema-names
          pnpm run lint:playwright-webserver
          pnpm run lint:ts-style
          pnpm run lint:no-telemetry
          pnpm run lint:secrets:all
          pnpm run ui:lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Focused runtime smoke tests
        if: matrix.node-version == 22
        run: |
          pnpm run test:scripts
          pnpm run test:dast-smoke
          pnpm run test:load

  fips-smoke:
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    needs: quality
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm run build

      - name: FIPS smoke check
        run: pnpm run verify:fips

  release-readiness:
    timeout-minutes: 10
    runs-on: ubuntu-22.04
    needs: [quality, fips-smoke]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify changeset CLI commands are available
        run: |
          pnpm exec changeset --version
          pnpm exec changeset version --help

      - name: Verify release workflow publish path
        run: |
          test -f ".github/workflows/changesets-release.yml"
          grep -q "pnpm run release:changesets:publish" ".github/workflows/changesets-release.yml"

      - name: Verify package release metadata
        shell: bash
        run: |
          set -euo pipefail
          node -e "const p=require('./package.json'); if (p.name !== 'workspace-dev') throw new Error('Unexpected package name: ' + p.name); if (!/^\\d+\\.\\d+\\.\\d+(?:[-+].*)?$/.test(p.version)) throw new Error('Invalid package version: ' + p.version); if (!String(p.packageManager || '').startsWith('pnpm@')) throw new Error('packageManager must pin pnpm');"

      - name: Fast release readiness summary
        run: |
          echo "release-readiness: required fast release metadata checks passed"
          echo "Deep release readiness remains available as a manual local release check"
