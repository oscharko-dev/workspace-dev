name: workspace-dev release gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

permissions:
  contents: read

jobs:
  quality:
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Set reproducible build metadata
        shell: bash
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
          echo "TZ=UTC" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Enforce workflow install policy
        run: pnpm run verify:workflow-install-scripts

      - name: Enforce workflow checkout credential policy
        run: pnpm run verify:workflow-persist-credentials

      - name: Enforce pnpm built dependency allowlist
        run: pnpm run verify:built-deps-allowlist

      - name: Enforce lockfile host allowlist
        run: pnpm run verify:lockfile-hosts

      - name: Enforce dependency vulnerability gate
        run: pnpm audit --audit-level high

      - name: Verify npm signature attestations
        run: npm audit signatures

      - name: Build release package
        run: pnpm run build

      - name: Enforce backend coverage gate
        run: pnpm run test:coverage

      - name: Verify package tarball contents
        run: pnpm run verify:pack

      - name: Enforce package publishing lint
        run: pnpm run lint:publint

      - name: Enforce package type publish lint
        run: pnpm run lint:types-publish

      - name: Run profile release gates
        run: pnpm run verify:profile-gates

  performance-web:
    timeout-minutes: 180
    runs-on: ubuntu-22.04
    needs: quality
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - packageDir: template/react-mui-app
            lockfile: template/react-mui-app/pnpm-lock.yaml
          - packageDir: template/react-tailwind-app
            lockfile: template/react-tailwind-app/pnpm-lock.yaml
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install template dependencies
        run: pnpm --dir "${{ matrix.packageDir }}" install --frozen-lockfile --ignore-scripts

      - name: Typecheck template
        run: pnpm --dir "${{ matrix.packageDir }}" run typecheck

      - name: Build template
        run: pnpm --dir "${{ matrix.packageDir }}" run build

      - name: Run performance baseline
        env:
          FIGMAPIPE_PERF_ARTIFACT_DIR: artifacts/performance
          FIGMAPIPE_PERF_BASELINE_PATH: artifacts/performance/perf-measured-baseline.json
          FIGMAPIPE_PERF_REPORT_PATH: artifacts/performance/perf-baseline-report.json
          FIGMAPIPE_PERF_STRICT: "false"
          FIGMAPIPE_PERF_ALLOW_BASELINE_BOOTSTRAP: "true"
        run: pnpm --dir "${{ matrix.packageDir }}" run perf:baseline

      - name: Run performance assert
        env:
          FIGMAPIPE_PERF_ARTIFACT_DIR: artifacts/performance
          FIGMAPIPE_PERF_BASELINE_PATH: perf-baseline.json
          FIGMAPIPE_PERF_STRICT: "true"
          FIGMAPIPE_PERF_ALLOW_BASELINE_BOOTSTRAP: "false"
        run: pnpm --dir "${{ matrix.packageDir }}" run perf:assert

      - name: Print performance summaries
        run: |
          set -euo pipefail
          node scripts/print-perf-report-summary.mjs "${{ matrix.packageDir }}/artifacts/performance/perf-baseline-report.json" || true
          node scripts/print-perf-report-summary.mjs "${{ matrix.packageDir }}/artifacts/performance/perf-assert-report.json" || true

      - name: Upload web performance artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: workspace-dev-release-performance-web-${{ github.run_id }}-${{ matrix.packageDir }}
          path: ${{ matrix.packageDir }}/artifacts/performance
          if-no-files-found: error

  fips-smoke:
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    needs: quality
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build release package
        run: pnpm run build

      - name: FIPS smoke check
        run: pnpm run verify:fips

  release-readiness:
    timeout-minutes: 10
    runs-on: ubuntu-22.04
    needs: [quality, performance-web, fips-smoke]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify changeset CLI commands are available
        run: |
          pnpm exec changeset --version
          pnpm exec changeset version --help

      - name: Verify release workflow publish path
        run: |
          test -f ".github/workflows/changesets-release.yml"
          grep -q "pnpm run release:changesets:publish" ".github/workflows/changesets-release.yml"

      - name: Verify package release metadata
        shell: bash
        run: |
          set -euo pipefail
          node -e "const p=require('./package.json'); if (p.name !== 'workspace-dev') throw new Error('Unexpected package name: ' + p.name); if (!/^\\d+\\.\\d+\\.\\d+(?:[-+].*)?$/.test(p.version)) throw new Error('Invalid package version: ' + p.version); if (!String(p.packageManager || '').startsWith('pnpm@')) throw new Error('packageManager must pin pnpm');"
