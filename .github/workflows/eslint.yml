name: ESLint

on:
  push:
    branches: [dev, dev-gate, main]
  pull_request:
    branches: [dev, dev-gate, main]
  schedule:
    - cron: "29 1 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eslint:
    name: Run ESLint gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Enforce workflow install policy
        run: pnpm run verify:workflow-install-scripts

      - name: Enforce workflow credential policy
        run: pnpm run verify:workflow-persist-credentials

      - name: Enforce TypeScript style
        run: pnpm run lint:ts-style

      - name: Enforce UI lint rules
        run: pnpm run ui:lint
