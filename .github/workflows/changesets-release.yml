name: workspace-dev changesets release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  quality-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Set reproducible build metadata
        shell: bash
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
          echo "TZ=UTC" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install template dependencies
        run: pnpm --dir template/react-mui-app install --frozen-lockfile

      - name: Enforce dependency vulnerability gate
        run: pnpm audit --audit-level high

      - name: Enforce template dependency vulnerability gate
        run: pnpm --dir template/react-mui-app audit --audit-level high

      - name: Enforce lockfile host allowlist
        run: pnpm run verify:lockfile-hosts

      - name: Enforce pipeline/template docs version consistency
        run: pnpm run verify:docs-template-stack

      - name: Verify npm signature attestations
        run: npm audit signatures

      - name: Verify template npm signature attestations
        run: pnpm run template:signatures

      - name: Run release quality gates
        run: |
          pnpm run typecheck
          pnpm run test:dast-smoke
          pnpm run test
          pnpm run template:test
          pnpm run test:golden
          pnpm run ui:test:coverage
          pnpm run test:coverage
          pnpm exec playwright install --with-deps chromium
          pnpm run ui:test:e2e
          pnpm run test:flaky-retry
          pnpm run test:bdd
          pnpm run test:property-based
          pnpm run ui:lint
          pnpm run lint:boundaries
          pnpm run lint:ts-style
          pnpm run lint:no-telemetry
          pnpm run build
          pnpm run lint:publint
          pnpm run lint:types-publish
          pnpm run lint:size
          pnpm run verify:licenses
          pnpm run verify:pack
          pnpm run verify:reproducible-build
          pnpm run verify:fips
          pnpm run sbom:cyclonedx
          pnpm run sbom:cyclonedx:template
          pnpm run sbom:spdx
          pnpm run sbom:spdx:template
          pnpm run verify:airgap

      - name: Upload release evidence artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: workspace-dev-release-evidence-node-${{ matrix.node-version }}
          path: |
            artifacts/testing
            artifacts/reproducibility
            artifacts/sbom
          if-no-files-found: ignore

  performance-web:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: template/react-mui-app/pnpm-lock.yaml

      - name: Install template dependencies
        run: pnpm --dir template/react-mui-app install --frozen-lockfile

      - name: Typecheck template app
        run: pnpm --dir template/react-mui-app run typecheck

      - name: Build template app
        run: pnpm --dir template/react-mui-app run build

      - name: Assert web performance budgets and regression (warn-only)
        env:
          FIGMAPIPE_PERF_ARTIFACT_DIR: template/react-mui-app/artifacts/performance
          FIGMAPIPE_PERF_BASELINE_PATH: template/react-mui-app/artifacts/performance/perf-baseline.json
          FIGMAPIPE_PERF_ROUTES_JSON: '["/","/overview","/checkout"]'
          FIGMAPIPE_PERF_PROFILES_JSON: '["mobile","desktop"]'
          FIGMAPIPE_PERF_STRICT: "true"
          FIGMAPIPE_PERF_ALLOW_BASELINE_BOOTSTRAP: "false"
        run: pnpm --dir template/react-mui-app run perf:assert

      - name: Summarize web performance report
        if: always()
        run: node scripts/print-perf-report-summary.mjs template/react-mui-app/artifacts/performance/perf-assert-report.json

      - name: Upload web performance artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: workspace-dev-performance-web-${{ github.run_id }}
          path: template/react-mui-app/artifacts/performance
          if-no-files-found: ignore

  mutation-testing:
    runs-on: ubuntu-latest
    needs: quality-matrix
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run mutation baseline (blocking >=68%)
        run: pnpm run test:mutation

      - name: Summarize mutation report
        if: always()
        run: node scripts/print-mutation-report-summary.mjs artifacts/testing/mutation/mutation.json

      - name: Upload mutation artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: workspace-dev-mutation-${{ github.run_id }}
          path: artifacts/testing/mutation
          if-no-files-found: ignore

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [quality-matrix, performance-web, mutation-testing]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Upgrade npm for trusted publishing
        shell: bash
        run: |
          set -euo pipefail
          npm install --global npm@11
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install template dependencies
        run: pnpm --dir template/react-mui-app install --frozen-lockfile

      - name: Set reproducible build metadata
        shell: bash
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
          echo "TZ=UTC" >> "$GITHUB_ENV"

      - name: Determine release metadata
        id: release_meta
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *-* ]]; then
            echo "npm_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare release evidence directory
        shell: bash
        run: |
          EVIDENCE_DIR="${RUNNER_TEMP}/release-evidence"
          mkdir -p "${EVIDENCE_DIR}/sbom"
          echo "RELEASE_EVIDENCE_DIR=${EVIDENCE_DIR}" >> "$GITHUB_ENV"

      - name: Generate CycloneDX SBOM
        run: node scripts/generate-cyclonedx.mjs "${RELEASE_EVIDENCE_DIR}/sbom/workspace-dev.cdx.json"

      - name: Generate template CycloneDX SBOM
        run: node scripts/generate-cyclonedx.mjs "${RELEASE_EVIDENCE_DIR}/sbom/figma-generated-app.cdx.json" --package-root template/react-mui-app

      - name: Generate SPDX SBOM
        run: node scripts/generate-spdx.mjs "${RELEASE_EVIDENCE_DIR}/sbom/workspace-dev.spdx.json"

      - name: Generate template SPDX SBOM
        run: node scripts/generate-spdx.mjs "${RELEASE_EVIDENCE_DIR}/sbom/figma-generated-app.spdx.json" --package-root template/react-mui-app

      - name: Verify SBOM parity
        run: node scripts/check-sbom-parity.mjs --directory "${RELEASE_EVIDENCE_DIR}/sbom"

      - name: Configure npm publish auth mode
        id: npm_auth_mode
        shell: bash
        run: |
          set -euo pipefail

          TRUSTED_NPMRC="${RUNNER_TEMP}/npm-trusted-publisher.npmrc"
          echo "registry=https://registry.npmjs.org/" > "${TRUSTED_NPMRC}"
          echo "NPM_CONFIG_USERCONFIG=${TRUSTED_NPMRC}" >> "$GITHUB_ENV"
          echo "auth_mode=trusted-publisher-oidc" >> "$GITHUB_OUTPUT"

      - name: Apply pending changesets and publish package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""
          WORKSPACE_DEV_PUBLISH_AUTH_MODE: trusted-publisher-oidc
        run: |
          set -euo pipefail

          CHANGESET_COUNT="$(find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')"
          echo "Detected ${CHANGESET_COUNT} pending changeset file(s)."
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "Current package target: ${PACKAGE_NAME}@${PACKAGE_VERSION}"

          VERSION_EXISTS="false"
          NPM_VIEW_ERR_FILE="${RUNNER_TEMP}/npm-view-version.err"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org/ >/dev/null 2>"${NPM_VIEW_ERR_FILE}"; then
            VERSION_EXISTS="true"
          else
            if grep -Eq "E404|No match found|is not in this registry" "${NPM_VIEW_ERR_FILE}"; then
              VERSION_EXISTS="false"
            else
              echo "Failed to query npm for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
              cat "${NPM_VIEW_ERR_FILE}" >&2
              exit 1
            fi
          fi
          echo "Version already published: ${VERSION_EXISTS}"

          if [[ "$CHANGESET_COUNT" != "0" ]]; then
            echo "Applying semantic version changes from changesets."
            pnpm changeset version
          else
            if [[ "${VERSION_EXISTS}" == "false" ]]; then
              echo "No changesets found and current version is not published yet. Keeping package version as-is for first publish."
            else
              echo "No changesets found and current version already exists on npm. Applying automatic patch version bump based on latest published version."
              LATEST_PUBLISHED_VERSION="$(npm view "${PACKAGE_NAME}" version --registry=https://registry.npmjs.org/)"
              NEXT_PATCH_VERSION="$(node -e 'const raw=String(process.argv[1] ?? "").trim(); const match=raw.match(/^([0-9]+)\.([0-9]+)\.([0-9]+)(?:[-+].*)?$/); if (!match) { console.error(`Unsupported published version format: ${raw}`); process.exit(1); } const major=Number(match[1]); const minor=Number(match[2]); const patch=Number(match[3]); console.log(`${major}.${minor}.${patch + 1}`);' "${LATEST_PUBLISHED_VERSION}")"
              echo "Latest published version: ${LATEST_PUBLISHED_VERSION}; next patch: ${NEXT_PATCH_VERSION}"
              npm version "${NEXT_PATCH_VERSION}" --no-git-tag-version
            fi
          fi

          if ! git diff --quiet; then
            echo "Workflow-local version bump detected."
            echo "Skipping direct git push to main because branch protection requires pull-request based updates."
          fi

          pnpm run release:changesets:publish

      - name: Create GitHub release and attach evidence assets
        id: github_release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="v${PACKAGE_VERSION}"

          NPM_VIEW_ERR_FILE="${RUNNER_TEMP}/npm-view-published.err"
          if ! npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org/ >/dev/null 2>"${NPM_VIEW_ERR_FILE}"; then
            echo "Expected ${PACKAGE_NAME}@${PACKAGE_VERSION} to be available on npm before creating GitHub release."
            cat "${NPM_VIEW_ERR_FILE}" >&2
            exit 1
          fi

          CYCLO_ASSET="${RELEASE_EVIDENCE_DIR}/sbom/workspace-dev.cdx.json"
          TEMPLATE_CYCLO_ASSET="${RELEASE_EVIDENCE_DIR}/sbom/figma-generated-app.cdx.json"
          SPDX_ASSET="${RELEASE_EVIDENCE_DIR}/sbom/workspace-dev.spdx.json"
          TEMPLATE_SPDX_ASSET="${RELEASE_EVIDENCE_DIR}/sbom/figma-generated-app.spdx.json"
          for ASSET_PATH in "${CYCLO_ASSET}" "${TEMPLATE_CYCLO_ASSET}" "${SPDX_ASSET}" "${TEMPLATE_SPDX_ASSET}"; do
            if [[ ! -f "${ASSET_PATH}" ]]; then
              echo "Required release evidence asset is missing: ${ASSET_PATH}"
              exit 1
            fi
          done

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists. Uploading/refreshing evidence assets."
            gh release upload "${RELEASE_TAG}" \
              "${CYCLO_ASSET}#workspace-dev-${PACKAGE_VERSION}.cdx.json" \
              "${TEMPLATE_CYCLO_ASSET}#figma-generated-app-${PACKAGE_VERSION}.cdx.json" \
              "${SPDX_ASSET}#workspace-dev-${PACKAGE_VERSION}.spdx.json" \
              "${TEMPLATE_SPDX_ASSET}#figma-generated-app-${PACKAGE_VERSION}.spdx.json" \
              --clobber
          else
            echo "Creating GitHub release ${RELEASE_TAG} with generated release notes."
            gh release create "${RELEASE_TAG}" \
              "${CYCLO_ASSET}#workspace-dev-${PACKAGE_VERSION}.cdx.json" \
              "${TEMPLATE_CYCLO_ASSET}#figma-generated-app-${PACKAGE_VERSION}.cdx.json" \
              "${SPDX_ASSET}#workspace-dev-${PACKAGE_VERSION}.spdx.json" \
              "${TEMPLATE_SPDX_ASSET}#figma-generated-app-${PACKAGE_VERSION}.spdx.json" \
              --target "${GITHUB_SHA}" \
              --title "workspace-dev ${RELEASE_TAG}" \
              --generate-notes
          fi

          RELEASE_URL="$(gh release view "${RELEASE_TAG}" --json url --jq '.url')"
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "url=${RELEASE_URL}" >> "$GITHUB_OUTPUT"

      - name: Upload release evidence artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: workspace-dev-release-evidence-${{ github.run_id }}
          path: |
            ${{ env.RELEASE_EVIDENCE_DIR }}/sbom
          if-no-files-found: ignore

      - name: Release summary
        if: always()
        shell: bash
        run: |
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$CURRENT_VERSION" == *-* ]]; then
            CURRENT_NPM_TAG="next"
          else
            CURRENT_NPM_TAG="latest"
          fi

          echo "## workspace-dev Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version (current package.json) | \`${CURRENT_VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| npm tag lane | \`${CURRENT_NPM_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Publish auth mode | \`${{ steps.npm_auth_mode.outputs.auth_mode }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Provenance path | \`pnpm run release:changesets:publish\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitHub release tag | \`${{ steps.github_release.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitHub release URL | ${{ steps.github_release.outputs.url }} |" >> "$GITHUB_STEP_SUMMARY"
