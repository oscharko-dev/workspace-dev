name: workspace-dev changesets release

on:
  workflow_dispatch:
    inputs:
      publish_auth_mode:
        description: npm publish authentication mode for this manual release run
        required: false
        default: trusted-publisher-oidc
        type: choice
        options:
          - trusted-publisher-oidc
          - npm-token

permissions:
  contents: read

jobs:
  release-preflight:
    timeout-minutes: 90
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Set reproducible build metadata
        shell: bash
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
          echo "TZ=UTC" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Prepare MUI template validation seed
        run: node scripts/run-with-heartbeat.mjs --label "MUI template validation seed install" --interval-seconds 60 -- pnpm --dir template/react-mui-app install --frozen-lockfile --ignore-scripts --prefer-offline

      - name: Prepare Tailwind template validation seed
        run: node scripts/run-with-heartbeat.mjs --label "Tailwind template validation seed install" --interval-seconds 60 -- pnpm --dir template/react-tailwind-app install --frozen-lockfile --ignore-scripts --prefer-offline

      - name: Enforce workflow install policy
        run: pnpm run verify:workflow-install-scripts

      - name: Enforce workflow checkout credential policy
        run: pnpm run verify:workflow-persist-credentials

      - name: Enforce pnpm built dependency allowlist
        run: pnpm run verify:built-deps-allowlist

      - name: Enforce pnpm supply-chain policy
        run: pnpm run verify:pnpm-supply-chain-policy

      - name: Scan active supply-chain IOCs
        run: pnpm run verify:supply-chain-iocs

      - name: Enforce dependency freshness policy
        run: pnpm run verify:npmrc-freshness

      - name: Enforce dependency vulnerability gate
        run: pnpm audit --audit-level high

      - name: Enforce lockfile host allowlist
        run: pnpm run verify:lockfile-hosts

      - name: Verify npm signature attestations
        run: npm audit signatures

      - name: Typecheck release package
        run: pnpm run typecheck

      - name: Build release package
        run: pnpm run build

      - name: Enforce backend coverage gate
        timeout-minutes: 75
        run: node scripts/run-with-heartbeat.mjs --label "backend coverage gate" --interval-seconds 60 -- pnpm run test:coverage

      - name: Verify package tarball contents
        run: pnpm run verify:pack

      - name: Enforce package publishing lint
        run: pnpm run lint:publint

      - name: Enforce package type publish lint
        run: pnpm run lint:types-publish

      - name: Run profile release gates
        run: pnpm run verify:profile-gates

  performance-web:
    timeout-minutes: 180
    runs-on: ubuntu-latest
    needs: release-preflight
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - packageDir: template/react-mui-app
          - packageDir: template/react-tailwind-app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.14.0
          package-manager-cache: false

      - name: Install template dependencies
        run: pnpm --dir "${{ matrix.packageDir }}" install --frozen-lockfile --ignore-scripts

      - name: Typecheck template
        run: pnpm --dir "${{ matrix.packageDir }}" run typecheck

      - name: Build template
        run: pnpm --dir "${{ matrix.packageDir }}" run build

      - name: Run performance baseline
        env:
          FIGMAPIPE_PERF_ARTIFACT_DIR: artifacts/performance
          FIGMAPIPE_PERF_BASELINE_PATH: artifacts/performance/perf-measured-baseline.json
          FIGMAPIPE_PERF_REPORT_PATH: artifacts/performance/perf-baseline-report.json
          FIGMAPIPE_PERF_STRICT: "false"
          FIGMAPIPE_PERF_ALLOW_BASELINE_BOOTSTRAP: "true"
        run: pnpm --dir "${{ matrix.packageDir }}" run perf:baseline

      - name: Run performance assert
        env:
          FIGMAPIPE_PERF_ARTIFACT_DIR: artifacts/performance
          FIGMAPIPE_PERF_BASELINE_PATH: perf-baseline.json
          FIGMAPIPE_PERF_STRICT: "true"
          FIGMAPIPE_PERF_ALLOW_BASELINE_BOOTSTRAP: "false"
        run: pnpm --dir "${{ matrix.packageDir }}" run perf:assert

      - name: Print performance summaries
        run: |
          set -euo pipefail
          node scripts/print-perf-report-summary.mjs "${{ matrix.packageDir }}/artifacts/performance/perf-baseline-report.json" || true
          node scripts/print-perf-report-summary.mjs "${{ matrix.packageDir }}/artifacts/performance/perf-assert-report.json" || true

      - name: Upload web performance artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: workspace-dev-changesets-performance-web-${{ github.run_id }}-${{ matrix.packageDir }}
          path: ${{ matrix.packageDir }}/artifacts/performance
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [release-preflight, performance-web]
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.11.1
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Verify npm trusted publishing CLI
        shell: bash
        run: |
          set -euo pipefail
          NPM_CLI_VERSION="$(npm --version)"
          echo "npm CLI version: ${NPM_CLI_VERSION}"
          node - "${NPM_CLI_VERSION}" <<'NODE'
          const rawVersion = String(process.argv[2] ?? "").trim();
          const version = rawVersion.split(".").map(Number);
          if (version.length < 3 || version.some((part) => !Number.isInteger(part))) {
            console.error(`Unable to parse npm CLI version: ${rawVersion}`);
            process.exit(1);
          }
          const [major, minor, patch] = version;
          if (major < 11 || (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))) {
            console.error(`npm trusted publishing requires npm CLI >= 11.5.1; found ${rawVersion}`);
            process.exit(1);
          }
          NODE

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Set reproducible build metadata
        shell: bash
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
          echo "TZ=UTC" >> "$GITHUB_ENV"

      - name: Determine release metadata
        id: release_meta
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *-* ]]; then
            echo "npm_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare release evidence directory
        id: release_evidence
        shell: bash
        run: |
          EVIDENCE_DIR="${RUNNER_TEMP}/release-evidence"
          mkdir -p "${EVIDENCE_DIR}/sbom"
          echo "RELEASE_EVIDENCE_DIR=${EVIDENCE_DIR}" >> "$GITHUB_ENV"
          echo "dir=${EVIDENCE_DIR}" >> "$GITHUB_OUTPUT"

      - name: Generate CycloneDX SBOM
        run: node scripts/generate-cyclonedx.mjs "${RELEASE_EVIDENCE_DIR}/sbom/workspace-dev.cdx.json"

      - name: Generate SPDX SBOM
        run: node scripts/generate-spdx.mjs "${RELEASE_EVIDENCE_DIR}/sbom/workspace-dev.spdx.json"

      - name: Select npm publish auth mode
        id: npm_auth_mode
        shell: bash
        env:
          REQUESTED_PUBLISH_AUTH_MODE: ${{ inputs.publish_auth_mode }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          AUTH_MODE="${REQUESTED_PUBLISH_AUTH_MODE:-trusted-publisher-oidc}"
          case "${AUTH_MODE}" in
            trusted-publisher-oidc)
              echo "Using npm trusted publishing via GitHub OIDC."
              TRUSTED_NPMRC="${RUNNER_TEMP}/npm-trusted-publisher.npmrc"
              echo "registry=https://registry.npmjs.org/" > "${TRUSTED_NPMRC}"
              echo "NPM_CONFIG_USERCONFIG=${TRUSTED_NPMRC}" >> "$GITHUB_ENV"
              if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
                echo "GitHub OIDC token request environment is not available. Check id-token: write permission." >&2
                exit 1
              fi
              OIDC_RESPONSE_FILE="${RUNNER_TEMP}/npm-oidc-response.json"
              curl --fail --silent --show-error \
                --header "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
                --output "${OIDC_RESPONSE_FILE}" \
                "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm%3Aregistry.npmjs.org"
              NPM_ID_TOKEN="$(node -e 'const { readFileSync } = require("node:fs"); const payload = JSON.parse(readFileSync(process.argv[1], "utf8")); if (typeof payload.value !== "string" || payload.value.length === 0) { console.error("GitHub OIDC response did not include a token value."); process.exit(1); } process.stdout.write(payload.value);' "${OIDC_RESPONSE_FILE}")"
              echo "::add-mask::${NPM_ID_TOKEN}"
              NPM_ID_TOKEN_FILE="${RUNNER_TEMP}/npm-id-token"
              printf '%s' "${NPM_ID_TOKEN}" > "${NPM_ID_TOKEN_FILE}"
              chmod 600 "${NPM_ID_TOKEN_FILE}"
              echo "NPM_ID_TOKEN_FILE=${NPM_ID_TOKEN_FILE}" >> "$GITHUB_ENV"
              ;;
            npm-token)
              if [[ -z "${NPM_TOKEN}" ]]; then
                echo "WORKSPACE_DEV_PUBLISH_AUTH_MODE=npm-token was requested, but repository secret NPM_TOKEN is not configured." >&2
                exit 1
              fi
              echo "Using repository NPM_TOKEN for npm publish because token mode was explicitly requested."
              ;;
            *)
              echo "Unsupported WORKSPACE_DEV_PUBLISH_AUTH_MODE '${AUTH_MODE}'. Expected trusted-publisher-oidc or npm-token." >&2
              exit 1
              ;;
          esac
          echo "auth_mode=${AUTH_MODE}" >> "$GITHUB_OUTPUT"

      - name: Apply pending changesets and publish package
        shell: bash
        env:
          NPM_TOKEN_SECRET: ${{ steps.npm_auth_mode.outputs.auth_mode == 'npm-token' && secrets.NPM_TOKEN || '' }}
          WORKSPACE_DEV_PUBLISH_AUTH_MODE: ${{ steps.npm_auth_mode.outputs.auth_mode }}
        run: |
          set -euo pipefail
          cleanup_npm_id_token() {
            unset NPM_ID_TOKEN
            if [[ -n "${NPM_ID_TOKEN_FILE:-}" ]]; then
              rm -f "${NPM_ID_TOKEN_FILE}"
            fi
          }
          trap cleanup_npm_id_token EXIT

          if [[ "${WORKSPACE_DEV_PUBLISH_AUTH_MODE}" == "npm-token" ]]; then
            export NODE_AUTH_TOKEN="${NPM_TOKEN_SECRET}"
            export NPM_TOKEN="${NPM_TOKEN_SECRET}"
          elif [[ "${WORKSPACE_DEV_PUBLISH_AUTH_MODE}" == "trusted-publisher-oidc" ]]; then
            if [[ -z "${NPM_ID_TOKEN_FILE:-}" || ! -s "${NPM_ID_TOKEN_FILE}" ]]; then
              echo "Trusted publishing token file is missing or empty." >&2
              exit 1
            fi
            NPM_ID_TOKEN="$(< "${NPM_ID_TOKEN_FILE}")"
            export NPM_ID_TOKEN
          fi

          CHANGESET_COUNT="$(find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')"
          echo "Detected ${CHANGESET_COUNT} pending changeset file(s)."
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "Current package target: ${PACKAGE_NAME}@${PACKAGE_VERSION}"

          VERSION_EXISTS="false"
          NPM_VIEW_ERR_FILE="${RUNNER_TEMP}/npm-view-version.err"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org/ >/dev/null 2>"${NPM_VIEW_ERR_FILE}"; then
            VERSION_EXISTS="true"
          else
            if grep -Eq "E404|No match found|is not in this registry" "${NPM_VIEW_ERR_FILE}"; then
              VERSION_EXISTS="false"
            else
              echo "Failed to query npm for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
              cat "${NPM_VIEW_ERR_FILE}" >&2
              exit 1
            fi
          fi
          echo "Version already published: ${VERSION_EXISTS}"

          if [[ "$CHANGESET_COUNT" != "0" ]]; then
            echo "Applying semantic version changes from changesets."
            pnpm changeset version
          else
            if [[ "${VERSION_EXISTS}" == "false" ]]; then
              echo "No changesets found and current version is not published yet. Keeping package version as-is for first publish."
            else
              echo "No changesets found and current version already exists on npm. Applying automatic patch version bump based on latest published version."
              LATEST_PUBLISHED_VERSION="$(npm view "${PACKAGE_NAME}" version --registry=https://registry.npmjs.org/)"
              NEXT_PATCH_VERSION="$(node -e "const raw=String(process.argv[1] ?? '').trim(); const match=raw.match(/^([0-9]+)\\.([0-9]+)\\.([0-9]+)(?:[-+].*)?$/); if (!match) { console.error('Unsupported published version format: ' + raw); process.exit(1); } const major=Number(match[1]); const minor=Number(match[2]); const patch=Number(match[3]); console.log(major + '.' + minor + '.' + (patch + 1));" "${LATEST_PUBLISHED_VERSION}")"
              echo "Latest published version: ${LATEST_PUBLISHED_VERSION}; next patch: ${NEXT_PATCH_VERSION}"
              npm version "${NEXT_PATCH_VERSION}" --no-git-tag-version
            fi
          fi

          if ! git diff --quiet; then
            echo "Workflow-local version bump detected."
            echo "Skipping direct git push to main because branch protection requires pull-request based updates."
          fi

          pnpm run release:changesets:publish

      - name: Create GitHub release and attach evidence assets
        id: github_release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="v${PACKAGE_VERSION}"

          NPM_VIEW_ERR_FILE="${RUNNER_TEMP}/npm-view-published.err"
          NPM_VERSION_VISIBLE="false"
          for ATTEMPT in {1..12}; do
            if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org/ >/dev/null 2>"${NPM_VIEW_ERR_FILE}"; then
              NPM_VERSION_VISIBLE="true"
              break
            fi
            if ! grep -Eq "E404|No match found|could not be found|is not in this registry" "${NPM_VIEW_ERR_FILE}"; then
              echo "Failed to query npm for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
              cat "${NPM_VIEW_ERR_FILE}" >&2
              exit 1
            fi
            echo "npm registry has not exposed ${PACKAGE_NAME}@${PACKAGE_VERSION} yet (attempt ${ATTEMPT}/12)."
            sleep 10
          done
          if [[ "${NPM_VERSION_VISIBLE}" != "true" ]]; then
            echo "Expected ${PACKAGE_NAME}@${PACKAGE_VERSION} to be available on npm before creating GitHub release after waiting for registry propagation."
            cat "${NPM_VIEW_ERR_FILE}" >&2
            exit 1
          fi

          CYCLO_ASSET="${RELEASE_EVIDENCE_DIR}/sbom/workspace-dev.cdx.json"
          SPDX_ASSET="${RELEASE_EVIDENCE_DIR}/sbom/workspace-dev.spdx.json"
          for ASSET_PATH in "${CYCLO_ASSET}" "${SPDX_ASSET}"; do
            if [[ ! -f "${ASSET_PATH}" ]]; then
              echo "Required release evidence asset is missing: ${ASSET_PATH}"
              exit 1
            fi
          done

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists. Uploading/refreshing evidence assets."
            gh release upload "${RELEASE_TAG}" \
              "${CYCLO_ASSET}#workspace-dev-${PACKAGE_VERSION}.cdx.json" \
              "${SPDX_ASSET}#workspace-dev-${PACKAGE_VERSION}.spdx.json" \
              --clobber
          else
            echo "Creating GitHub release ${RELEASE_TAG} with generated release notes."
            gh release create "${RELEASE_TAG}" \
              "${CYCLO_ASSET}#workspace-dev-${PACKAGE_VERSION}.cdx.json" \
              "${SPDX_ASSET}#workspace-dev-${PACKAGE_VERSION}.spdx.json" \
              --target "${GITHUB_SHA}" \
              --title "workspace-dev ${RELEASE_TAG}" \
              --generate-notes
          fi

          RELEASE_URL="$(gh release view "${RELEASE_TAG}" --json url --jq '.url')"
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "url=${RELEASE_URL}" >> "$GITHUB_OUTPUT"

      - name: Upload release evidence artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        if: always()
        with:
          name: workspace-dev-release-evidence-${{ github.run_id }}
          path: |
            ${{ steps.release_evidence.outputs.dir }}/sbom
          if-no-files-found: ignore

      - name: Release summary
        if: always()
        shell: bash
        env:
          GITHUB_RELEASE_TAG: ${{ steps.github_release.outputs.tag }}
          GITHUB_RELEASE_URL: ${{ steps.github_release.outputs.url }}
          PUBLISH_AUTH_MODE: ${{ steps.npm_auth_mode.outputs.auth_mode }}
        run: |
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$CURRENT_VERSION" == *-* ]]; then
            CURRENT_NPM_TAG="next"
          else
            CURRENT_NPM_TAG="latest"
          fi

          {
            echo "## workspace-dev Release Summary"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Version (current package.json) | \`${CURRENT_VERSION}\` |"
            echo "| npm tag lane | \`${CURRENT_NPM_TAG}\` |"
            echo "| Publish auth mode | \`${PUBLISH_AUTH_MODE}\` |"
            echo "| Provenance path | \`pnpm run release:changesets:publish\` |"
            echo "| GitHub release tag | \`${GITHUB_RELEASE_TAG}\` |"
            echo "| GitHub release URL | ${GITHUB_RELEASE_URL} |"
          } >> "$GITHUB_STEP_SUMMARY"
