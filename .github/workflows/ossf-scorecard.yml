name: OSSF Scorecard

on:
  push:
    branches: [dev]
  schedule:
    - cron: "30 5 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard analysis
        id: scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # Keep PR/main gates deterministic: publish SARIF to GitHub only.
          # publish_results=true requires stricter workflow permissions than
          # this repository currently allows and causes hard CI failures.
          publish_results: false

      - name: Upload Scorecard SARIF
        if: github.event_name != 'push'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif

      - name: Upload Scorecard artifact
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          if-no-files-found: error
