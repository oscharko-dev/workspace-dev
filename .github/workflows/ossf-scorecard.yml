name: OSSF Scorecard

on:
  push:
    branches: [dev]
  schedule:
    - cron: "30 5 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  analysis:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/dev'
    permissions:
      actions: read
      contents: read
      security-events: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard analysis
        id: scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # Publication is limited to dev; non-dev manual dispatches take the
          # fallback path below instead of invoking the Scorecard action.
          publish_results: ${{ github.ref == 'refs/heads/dev' }}

      - name: Upload Scorecard SARIF
        if: github.event_name != 'push'
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4
        with:
          sarif_file: scorecard-results.sarif

      - name: Upload Scorecard artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          if-no-files-found: error

  manual-non-dev-info:
    if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Explain dev-only publication behavior
        run: |
          echo "Skipping OSSF Scorecard analysis for manual runs outside refs/heads/dev."
          echo "Publishable Scorecard analysis runs only from the dev branch."
