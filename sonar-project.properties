# ============================================================
# SonarCloud project configuration for workspace-dev
# sonar.projectKey and sonar.organization are injected at
# runtime via GitHub Actions repository variables so that
# forks can override them without touching this file.
# ============================================================

# ---------- Project metadata --------------------------------
sonar.projectName=workspace-dev
sonar.links.homepage=https://github.com/oscharko-dev/workspace-dev
sonar.links.ci=https://github.com/oscharko-dev/workspace-dev/actions
sonar.links.issue=https://github.com/oscharko-dev/workspace-dev/issues
sonar.links.scm=https://github.com/oscharko-dev/workspace-dev

# ---------- Encoding -----------------------------------------
sonar.sourceEncoding=UTF-8

# ---------- Sources ------------------------------------------
# All production and test code lives under these three roots.
sonar.sources=src,ui-src/src,integration

# Files matching these patterns are treated as test sources
# (coverage and duplication rules are applied differently).
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.fuzz.test.ts,\
  **/*.e2e.test.ts,\
  **/*.live.test.ts,\
  **/*.integration.test.ts,\
  **/*.helpers.test.ts

# ---------- Global exclusions --------------------------------
# Completely ignored by all rules (no analysis, no duplication).
sonar.exclusions=\
  **/node_modules/**,\
  dist/**,\
  coverage/**,\
  artifacts/**,\
  storybook-static/**,\
  reference/**,\
  template/**,\
  src/parity/fixtures/golden/**,\
  integration/fixtures/**

# ---------- Coverage -----------------------------------------
# lcov reports are produced by:
#   • pnpm run test:coverage   → coverage/lcov.info  (c8, Node test runner)
#   • pnpm run ui:test:coverage → coverage/ui/lcov.info (Vitest v8, UI)
sonar.javascript.lcov.reportPaths=\
  coverage/lcov.info,\
  coverage/ui/lcov.info

# Files excluded from coverage metrics (type-only modules,
# generated entry points, and golden fixtures that are
# intentionally excluded from the c8 run).
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.fuzz.test.ts,\
  **/*.e2e.test.ts,\
  **/*.live.test.ts,\
  **/*.integration.test.ts,\
  **/*.helpers.test.ts,\
  src/isolated-server-entry.ts,\
  src/job-engine.ts,\
  src/job-engine/figma-source.ts,\
  src/job-engine/types.ts,\
  src/parity/types.ts,\
  src/parity/types-core.ts,\
  src/parity/types-edit-session.ts,\
  src/parity/types-job.ts,\
  src/parity/types-ir.ts,\
  src/parity/types-kpi.ts,\
  src/parity/types-mapping.ts,\
  src/parity/types-sync.ts,\
  src/parity/fixtures/**,\
  integration/**

# ---------- Duplication (CPD) --------------------------------
sonar.cpd.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  integration/**,\
  src/parity/fixtures/**

# ---------- JavaScript / TypeScript --------------------------
sonar.javascript.environments=node
